<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0e2f56;
      --accent: #ff8f1f;
      --bg: #edf2f7;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at top right, #f7fbff 0%, #edf2f7 60%, #e6edf5 100%);
      color: #1f2f45;
      font-family: 'Oswald', sans-serif;
    }

    .header {
      background: linear-gradient(120deg, #0e2f56 0%, #0f4d8c 50%, #14618a 100%);
      color: #fff;
      box-shadow: 0 4px 16px rgba(14, 47, 86, 0.25);
      padding: 16px 14px;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .header-row {
      max-width: 1180px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .title {
      margin: 0;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 1.35rem;
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .pill {
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.78rem;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
    }

    .pill:hover {
      background: rgba(255, 255, 255, 0.24);
      transform: translateY(-1px);
    }

    .pill.active {
      background: #fff;
      border-color: #fff;
      color: var(--navy);
    }

    .refresh-btn {
      border: none;
      background: var(--accent);
      color: #112a45;
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
    }

    .refresh-btn:hover {
      filter: brightness(1.05);
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 14px;
    }

    .stamp {
      color: #5f7590;
      font-family: 'Roboto Mono', monospace;
      font-size: 0.76rem;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 14px;
    }

    .league-card {
      background: #fff;
      border: 1px solid #d7e0ea;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 5px 14px rgba(22, 42, 66, 0.08);
    }

    .league-head {
      background: linear-gradient(180deg, #f8fbff, #eff4f9);
      border-bottom: 1px solid #e4ebf3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
    }

    .league-title {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: #163659;
    }

    .league-count {
      font-family: 'Roboto Mono', monospace;
      color: #59718d;
      font-size: 0.72rem;
    }

    .story-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .story-item {
      border-bottom: 1px solid #eef2f7;
      padding: 10px 12px;
      display: grid;
      grid-template-columns: 70px 1fr;
      gap: 10px;
      align-items: start;
    }

    .story-item:last-child {
      border-bottom: none;
    }

    .story-image {
      width: 70px;
      height: 50px;
      object-fit: cover;
      border-radius: 6px;
      background: #dbe4ef;
    }

    .story-title {
      margin: 0 0 4px;
      color: #163659;
      font-size: 0.96rem;
      line-height: 1.25;
    }

    .story-link {
      color: inherit;
      text-decoration: none;
    }

    .story-link:hover .story-title {
      color: #0f4d8c;
      text-decoration: underline;
    }

    .story-desc {
      margin: 0;
      color: #4f647d;
      font-family: 'Roboto Mono', monospace;
      font-size: 0.73rem;
      line-height: 1.4;
      display: -webkit-box;
      line-clamp: 2;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .story-meta {
      margin-top: 6px;
      color: #6a7f96;
      font-family: 'Roboto Mono', monospace;
      font-size: 0.69rem;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .empty {
      padding: 18px 12px;
      color: #71869f;
      font-family: 'Roboto Mono', monospace;
      font-size: 0.78rem;
    }

    .loader {
      text-align: center;
      padding: 80px 12px;
      color: #5e738c;
      font-family: 'Roboto Mono', monospace;
    }

    @media (max-width: 680px) {
      .title {
        font-size: 1.05rem;
      }

      .story-item {
        grid-template-columns: 1fr;
      }

      .story-image {
        width: 100%;
        height: 132px;
      }
    }
  </style>
</head>

<body>
  <div id="siteNav"></div>

  <header class="header">
    <div class="header-row">
      <h1 class="title">Top News</h1>
      <div class="controls" id="sportFilters"></div>
      <button type="button" class="refresh-btn" onclick="loadNews()">Refresh</button>
    </div>
  </header>

  <main class="container">
    <div class="stamp" id="stamp">Loading headlines...</div>
    <div id="newsGrid" class="grid">
      <div class="loader">Pulling top stories from all leagues...</div>
    </div>
  </main>

  <script src="clientApi.js"></script>
  <script>
    var allNews = [];
    var activeFilter = 'all';

    function toStamp() {
      var now = new Date();
      return now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }) + ' | ' +
        now.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function renderFilters() {
      var filters = [{ key: 'all', label: 'All' }];
      (allNews || []).forEach(function (group) {
        filters.push({ key: group.key, label: group.label });
      });

      document.getElementById('sportFilters').innerHTML = filters.map(function (item) {
        return '<button class="pill ' + (item.key === activeFilter ? 'active' : '') + '" onclick="setFilter(\'' + item.key + '\')">' + item.label + '</button>';
      }).join('');
    }

    function setFilter(filterKey) {
      activeFilter = filterKey || 'all';
      renderFilters();
      renderNews();
    }

    function escapeHtml(value) {
      return String(value === undefined || value === null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatPublished(value) {
      if (!value) {
        return 'Just now';
      }
      var date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return 'Just now';
      }
      return date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }) + ' | ' +
        date.toLocaleDateString([], { month: 'short', day: 'numeric' });
    }

    function renderLeague(group) {
      var stories = group.articles || [];
      var listHtml = '';

      if (!stories.length) {
        listHtml = '<li class="empty">' + (group.error ? 'Unable to load: ' + escapeHtml(group.error) : 'No stories available.') + '</li>';
      } else {
        listHtml = stories.map(function (story) {
          var title = escapeHtml(story.headline || 'Top story');
          var desc = escapeHtml(story.description || '');
          var source = escapeHtml(story.source || 'ESPN');
          var published = formatPublished(story.published);
          var link = story.link || '#';
          var image = story.image || '';
          var imageHtml = image
            ? '<img class="story-image" src="' + image + '" alt="">'
            : '<div class="story-image"></div>';

          return '<li class="story-item">' +
            imageHtml +
            '<div>' +
            '<a class="story-link" href="' + link + '" target="_blank" rel="noopener noreferrer"><h3 class="story-title">' + title + '</h3></a>' +
            '<p class="story-desc">' + desc + '</p>' +
            '<div class="story-meta">' + source + ' | ' + published + '</div>' +
            '</div>' +
            '</li>';
        }).join('');
      }

      return '<section class="league-card">' +
        '<div class="league-head"><h2 class="league-title">' + escapeHtml(group.label) + '</h2><span class="league-count">' + stories.length + ' stories</span></div>' +
        '<ul class="story-list">' + listHtml + '</ul>' +
        '</section>';
    }

    function renderNews() {
      var groups = activeFilter === 'all'
        ? allNews
        : (allNews || []).filter(function (item) { return item.key === activeFilter; });

      if (!groups || !groups.length) {
        document.getElementById('newsGrid').innerHTML = '<div class="loader">No feeds selected.</div>';
        return;
      }

      document.getElementById('newsGrid').innerHTML = groups.map(renderLeague).join('');
      document.getElementById('stamp').innerText = 'Last updated ' + toStamp();
    }

    function loadNews() {
      document.getElementById('newsGrid').innerHTML = '<div class="loader">Refreshing top stories...</div>';
      MLBClient.getTopNewsData(5)
        .then(function (payload) {
          allNews = payload || [];
          renderFilters();
          renderNews();
        })
        .catch(function (err) {
          document.getElementById('newsGrid').innerHTML = '<div class="loader">Failed to load news: ' + escapeHtml(err && err.message ? err.message : err) + '</div>';
        });
    }

    window.onload = function () {
      MLBClient.renderSiteNav('news', 'siteNav');
      loadNews();
    };
  </script>
</body>

</html>
