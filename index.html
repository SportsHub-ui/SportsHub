<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="SportsHub">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a356f">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <title>MLB Board</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0046ad;
      --gold: #fec524;
      --ink: #102a43;
      --bg1: #f5f8fc;
      --bg2: #dbe8f5;
    }

    body {
      margin: 0;
      font-family: 'Oswald', sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 20% 10%, white 0%, var(--bg1) 45%, var(--bg2) 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 16px 24px 24px;
      box-sizing: border-box;
      overflow-y: auto;
    }

    .shell {
      width: min(920px, 100%);
      min-height: calc(100vh - 40px);
      background: white;
      border-radius: 18px;
      box-shadow: 0 18px 40px rgba(0, 30, 60, 0.15);
      overflow: hidden;
      border: 1px solid #d7e3ef;
      display: flex;
      flex-direction: column;
    }

    .hero {
      height: clamp(120px, 20vh, 220px);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #ffffff 0%, #eef4fb 100%);
      flex: 0 0 auto;
    }

    .hero-banner {
      width: 100%;
      height: 100%;
      line-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-banner img {
      width: auto;
      max-width: 100%;
      height: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    .hero-text {
      padding: 22px 28px 28px;
      background: linear-gradient(135deg, var(--navy), #133f88);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hero-text h1 {
      margin: 0;
      letter-spacing: 0.03em;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      text-transform: uppercase;
      text-align: center;
    }

    .hero-text p {
      margin: 10px 0 0;
      opacity: 0.9;
      font-size: 1rem;
      font-family: sans-serif;
      text-align: center;
    }

    #siteNav {
      position: relative !important;
      top: auto !important;
      z-index: auto !important;
      background: transparent !important;
      padding: 6px 12px 0;
      display: flex;
      justify-content: center;
      flex: 0 0 auto;
    }

    .landing-cards {
      padding: 8px 14px 18px;
      flex: 1;
      min-height: 0;
    }

    .landing-cards-frame {
      width: 100%;
      height: clamp(480px, calc(67vh - 56px), 920px);
      border: 1px solid #d7e3ef;
      border-radius: 14px;
      background: #f2f5f9;
      display: block;
    }

    @media (max-width: 600px) {
      html, body {
        height: 100%;
      }

      body {
        padding: 0;
        display: block;
      }

      .shell {
        border-radius: 0;
        box-shadow: none;
        border: none;
        width: 100%;
        min-height: 100dvh;
      }

      .hero {
        height: 20dvh;
      }

      #siteNav {
        padding: 6px 8px 0;
      }

      .landing-cards {
        padding: 8px 8px 16px;
      }

      .landing-cards-frame {
        height: calc(100dvh - 20dvh - 54px);
        min-height: 460px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="hero-banner">
        <img src="assets/icons/apple-touch-icon.png" alt="Sports Hub icon">
      </div>

    </section>

    <div id="siteNav"></div>
    <section class="landing-cards">
      <iframe id="favCardsFrame" class="landing-cards-frame" title="Favorite games" loading="lazy"></iframe>
    </section>
  </main>

  <script src="clientApi.js"></script>
  <script>
    MLBClient.renderSiteNav('all', 'siteNav');

    (function renderLandingFavorites() {
      var frame = document.getElementById('favCardsFrame');
      if (!frame || !window.MLBClient || typeof MLBClient.getPageUrl !== 'function') {
        return;
      }
      var favUrl = MLBClient.getPageUrl('all');
      frame.src = favUrl + (favUrl.indexOf('?') === -1 ? '?' : '&') + 'embed=1';
    })();
  </script>
</body>
</html>
