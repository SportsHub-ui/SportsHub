<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="SportsHub">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a356f">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <title>MLB Board</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0046ad;
      --gold: #fec524;
      --ink: #102a43;
      --bg1: #f5f8fc;
      --bg2: #dbe8f5;
    }

    body {
      margin: 0;
      font-family: 'Oswald', sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 20% 10%, white 0%, var(--bg1) 45%, var(--bg2) 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shell {
      width: min(920px, 100%);
      background: white;
      border-radius: 18px;
      box-shadow: 0 18px 40px rgba(0, 30, 60, 0.15);
      overflow: hidden;
      border: 1px solid #d7e3ef;
    }

    .hero {
      overflow: hidden;
    }

    .hero-banner {
      width: 100%;
      line-height: 0;
    }

    .hero-banner img {
      width: 100%;
      height: auto;
      display: block;
    }

    .hero-text {
      padding: 22px 28px 28px;
      background: linear-gradient(135deg, var(--navy), #133f88);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hero-text h1 {
      margin: 0;
      letter-spacing: 0.03em;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      text-transform: uppercase;
      text-align: center;
    }

    .hero-text p {
      margin: 10px 0 0;
      opacity: 0.9;
      font-size: 1rem;
      font-family: sans-serif;
      text-align: center;
    }

    .landing-note {
      padding: 28px;
      text-align: center;
      font-family: sans-serif;
      color: #41556d;
      font-size: 0.98rem;
    }

    .landing-note p {
      margin: 0;
    }

    .landing-note p + p {
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="hero-banner">
        <img src="assets/icons/apple-touch-icon.png" alt="Sports Hub icon">
      </div>

    </section>

    <div id="siteNav"></div>
    <section class="landing-note">
      <p>Use the menu above to move between league views.</p>
      <p>Mark individual games as favorites to build your All page by date.</p>
      <p>Use Keep On when you want the dashboard to stay awake on your phone or tablet while you watch scores update live.</p>
    </section>
  </main>

  <script src="clientApi.js"></script>
  <script>
    MLBClient.renderSiteNav('mlb', 'siteNav');
  </script>
</body>
</html>
